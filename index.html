<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <meta
      name="description"
      content="TinDay ile doğum günü aynı olan kişilerle eşleşin, sohbet edin, kutlayın. Güvenli, eğlenceli ve kişisel sosyal deneyim."
    />
    <meta
      name="keywords"
      content="doğum günü sohbet, TinDay, aynı gün doğanlar, arkadaşlık uygulaması, doğum günü eşleşme, kutlama, p2p sohbet, eğlenceli chat, doğum günü sohbet, doğum gününü paylaşan kişiler, aynı gün doğanlar, doğum günü eşleşme uygulaması, TinDay, doğum günü arkadaşlık, sosyal ağ, yeni nesil sohbet uygulaması, kutlama uygulaması, özel günlerde arkadaş bul, takvim tabanlı eşleşme, p2p sohbet, güvenli chat, doğum günü kutlama, birebir sohbet, global chat, yeni sosyal medya deneyimi, doğum günü tabanlı sosyal ağ, tin day, gün eşleştirme sohbet, timeline eşleşmesi, özel gün arkadaşlık, mobil sosyal ağ, web app sosyal medya, iletişim platformu, dijital doğum günü partisi, doğum günü tanışma, eşleşme tabanlı arkadaşlık, web tabanlı sohbet, gerçek zamanlı bağlantı, chat with birthday twins, match on your birthday, birthday matching app, calendar-based chat, celebrate with others, same birthday meet app, unique social experience"
    />

    <meta name="author" content="TinDay Team" />
    <link rel="canonical" href="https://tinday.app.tc/" />

    <meta property="og:title" content="TinDay | Eşleşin, Konuşun, Kutlayın!" />
    <meta
      property="og:description"
      content="Doğum gününüzü paylaşan kişilerle anında eşleşin ve kutlamaya başlayın. TinDay ile doğum günleri daha özel!"
    />
    <meta
      property="og:image"
      content="https://tinday.app.tc/assets/twinday/TinDay-Logo.png"
    />
    <meta property="og:url" content="https://tinday.app.tc/" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TinDay | Eşleşin, Konuşun, Kutlayın!" />
    <meta
      name="twitter:description"
      content="TinDay ile doğum gününüzü paylaşan kişilerle sohbet edin, kutlayın, eğlenin. Yeni sosyal deneyim!"
    />
    <meta
      name="twitter:image"
      content="https://tinday.app.tc/assets/twinday/TinDay-Logo.png"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link
      rel="apple-touch-icon"
      href="https://tinday.app.tc/assets/192x192.png"
    />
    <link
      rel="shortcut icon"
      href="https://tinday.app.tc/assets/twinday/TinDayCircle-Logo.png"
      type="image/png"
    />
    <link rel="manifest" href="src/manifest.json" />
    <link rel="stylesheet" href="src/style.css" />
    <meta name="theme-color" content="#fc918c" id="themeColorMeta" />
    <title>TinDay Social</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="anonymous-login">
      <div class="login-container">
        <img
          src="https://tinday.app.tc/assets/twinday/TinDaySquare-Logo.png"
          alt="TinDay Logo"
          class="login-container__logo"
        />
        <form id="loginForm">
          <div class="form-group">
            <label for="username" class="form-group__label"
              >Kullanıcı Adı</label
            >
            <input
              type="text"
              id="username"
              name="username"
              required
              class="form-group__input"
            />
          </div>
          <div class="form-group">
            <label for="birthdate" class="form-group__label"
              >Doğum Tarihi</label
            >
            <input
              type="date"
              id="birthdate"
              name="birthdate"
              required
              class="form-group__input"
            />
          </div>
          <button type="submit" disabled id="loginButton" class="login-button">
            Kutla
          </button>
        </form>
      </div>
      <div id="previousUser" class="previous-user" style="display: none">
        <a href="#" id="continueWithPrevious" class="previous-user__link"
          >Önceki Kullanıcı Adı ile Devam Et</a
        >
      </div>
    </div>

    <div id="chat-screen">
      <header>
        <img
          src="https://tinday.app.tc/assets/twinday/TinDaySquare-Logo.png"
          alt="TinDay Logo"
        />
        <div id="header-title">TinDay</div>
        <a
          href="#"
          onclick="displaySystemNotification(`Hakkında sayfamız beta sonunda getirilecek.`);"
          class="about-button"
        >
          <i class="fa-solid fa-circle-question"></i>
        </a>
        <a onclick="toggleTheme()" class="theme-button">
          <i class="fa-solid fa-circle-half-stroke"></i>
        </a>
        <button id="inbox-button" class="theme-button">
          <i class="fa-solid fa-inbox"></i>
        </button>
      </header>

      <main id="messages"></main>

      <div id="favoritesPanel">
        <div id="favoritesContent"></div>
      </div>

      <div id="inbox-panel" class="side-panel">
        <div id="inbox-content"></div>
      </div>

      <div class="birthday-countdown-overlay" id="birthdayCountdownOverlay">
        <div id="countdown-number"></div>
      </div>

      <div class="input-container">
        <div id="reply-preview-area">
          <div id="reply-preview-content"></div>
          <button id="cancel-reply-btn">×</button>
        </div>
        <form id="message-form" class="input-area">
          <input
            type="text"
            id="message-input"
            placeholder="Bir mesaj yaz... (Komutlar için t.help)"
            autocomplete="off"
          />
          <input type="file" id="file-input" style="display: none" />
          <div class="actions-container">
            <button type="button" id="add-button">
              <i class="fa-solid fa-plus"></i>
            </button>
            <div class="actions-popup" id="actions-popup">
              <button type="button" class="action-btn" id="upload-file-btn">
                <i class="fa-solid fa-paperclip"></i> Dosya Ekle
              </button>
              <button type="button" class="action-btn" id="open-favorites-btn">
                <i class="fa-solid fa-star"></i> Favoriler
              </button>
            </div>
          </div>
          <button type="submit" id="send-btn">
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>

    <div class="modal-overlay" id="dynamicModal" style="display: none">
      <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <p id="modalMessage"></p>
        <div id="modalCheckboxContainer" style="display: none">
          <input type="checkbox" id="modalCheckbox" />
          <label for="modalCheckbox" id="modalCheckboxLabel"></label>
        </div>
        <div class="modal-buttons" id="modalButtons"></div>
      </div>
    </div>

    <div id="call-panel" class="call-notification-panel">
      <div class="caller-info">
        <i class="fa-solid fa-circle-user"></i>
        <div class="caller-details">
          <div id="caller-name" class="caller-name">Bilinmeyen Arayan</div>
          <div id="call-timer" class="call-timer">00:00</div>
        </div>
      </div>
      <div class="call-actions">
        <button
          id="acceptCallBtn"
          class="call-action-btn accept-btn"
          aria-label="Aramayı Aç"
        >
          <i class="fa-solid fa-phone"></i>
        </button>
        <button
          id="declineCallBtn"
          class="call-action-btn decline-btn"
          aria-label="Aramayı Kapat"
        >
          <i class="fas fa-phone-slash"></i>
        </button>
      </div>
    </div>

    <div id="remote-audio-container"></div>
    <div id="audio-container">
      <audio
        id="outgoing-call-sound"
        loop
        src="https://tinday.app.tc/assets/twinday/sounds/TinDay-IncomingCall.mp3"
      ></audio>
      <audio
        id="incoming-call-sound"
        loop
        src="https://tinday.app.tc/assets/twinday/sounds/TinDay-IncomingCall.mp3"
        type="audio/mpeg"
      ></audio>
    </div>

    <div id="context-menu">
      <button id="callUser"><i class="fa-solid fa-phone"></i></button>
      <button id="replyUser"><i class="fa-solid fa-reply"></i></button>
      <button id="sendInboxUser"><i class="fa-solid fa-inbox"></i></button>
      <button id="deleteMessage"><i class="fa-solid fa-trash"></i></button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
    <script src="lib/confetti.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
